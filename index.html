<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Telemetry H2H</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: white; padding: 20px; }
        #chart { width: 100%; height: 500px; background-color: #2d2d2d; border-radius: 8px; }
        .loading { font-size: 20px; color: #ff1801; }
    </style>
</head>
<body>

    <h2>Speed comparison: ANT vs RUS (Australia 2026 Q)</h2>
    <div id="status" class="loading">Loading data from the server...</div>
    
    <div id="chart"></div>

    <script>
        // Local API
        const API_URL = "http://127.0.0.1:8000/api/telemetry?year=2025&track=5&session=Q&driver1=VER&driver2=RUS";

        async function loadData() {
            try {
                // 1. Asking backend
                const response = await fetch(API_URL);
                const data = await response.json();

                // 2. Loading status removing
                document.getElementById('status').style.display = 'none';

                // 3. line for (VER)
                const trace1 = {
                    x: data.VER.distance, // Ось X - дистанция
                    y: data.VER.speed,    // Ось Y - скорость
                    mode: 'lines',
                    name: 'M. Verstappen',
                    line: {color: '#00D2BE', width: 2} // Цвет Мерседеса
                };

                // 4. Line for (RUS)
                const trace2 = {
                    x: data.RUS.distance,
                    y: data.RUS.speed,
                    mode: 'lines',
                    name: 'G. Russell',
                    line: {color: '#aaaaaa', width: 2} // Grey
                };

                // 5. Graphic setting
                const layout = {
                    title: 'Speed vs Distance',
                    paper_bgcolor: '#2d2d2d', // Dark theme
                    plot_bgcolor: '#2d2d2d',
                    font: { color: 'white' },
                    xaxis: { title: 'Distance (m)' },
                    yaxis: { title: 'Speed (km/h)' }
                };

                // 6. Drawing
                Plotly.newPlot('chart', [trace1, trace2], layout);

            } catch (error) {
                document.getElementById('status').innerText = "Loading data error!";
                console.error("Fetch error:", error);
            }
        }

        loadData();
    </script>

</body>
</html>
